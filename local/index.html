<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монополія України</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Стартовий екран -->
    <div id="start-screen" class="start-screen">
        <div class="start-card">
            <h1>🇺🇦 МОНОПОЛІЯ УКРАЇНИ</h1>
            <p class="subtitle">Капіталіст України — економічна гра</p>
            <div class="player-setup">
                <label>Кількість гравців:</label>
                <select id="player-count">
                    <option value="2">2 гравці</option>
                    <option value="3">3 гравці</option>
                    <option value="4" selected>4 гравці</option>
                    <option value="5">5 гравців</option>
                    <option value="6">6 гравців</option>
                </select>
                <div id="player-names"></div>
                <button id="start-game-btn">Почати гру</button>
            </div>
            <p class="hint">Гравці грають по черзі на одному пристрої</p>
        </div>
    </div>

    <!-- Головна гра -->
    <div id="game-screen" class="game-screen hidden">
        <div class="game-layout">
            <!-- Ліва панель: гравці + чат -->
            <div class="left-panel">
                <aside class="players-panel" id="players-panel"></aside>
                <div class="chat-panel">
                    <h3 class="chat-title">💬 Чат гравців</h3>
                    <div class="chat-messages" id="chat-messages"></div>
                    <div class="chat-input-row">
                        <input type="text" id="chat-input" class="chat-input"
                               placeholder="Написати повідомлення…" maxlength="120"
                               onkeydown="if(event.key==='Enter')sendChatMessage()">
                        <button class="chat-send-btn" onclick="sendChatMessage()">➤</button>
                    </div>
                </div>
            </div>

            <!-- Центральна частина: дошка -->
            <main class="board-wrapper">
                <div class="board" id="board">
                    <!-- Клітинки створюються JS -->
                    <div class="board-center">
                        <div class="logo">🇺🇦</div>
                        <div class="logo-text">МОНОПОЛІЯ<br>УКРАЇНИ</div>
                        <div class="dice-area">
                            <div class="die" id="die1">?</div>
                            <div class="die" id="die2">?</div>
                        </div>
                        <button id="roll-btn" class="big-btn">🎲 Кинути кубики</button>
                        <button id="end-turn-btn" class="big-btn hidden">Завершити хід</button>
                        <div class="current-player" id="current-player-info"></div>
                    </div>
                </div>
            </main>

            <!-- Права панель: дії та лог -->
            <aside class="actions-panel">
                <div class="action-buttons" id="action-buttons"></div>
                <div class="log" id="log">
                    <h3>Хід гри</h3>
                    <div id="log-content"></div>
                </div>
            </aside>
        </div>
    </div>

    <!-- Модальне вікно -->
    <div id="modal" class="modal hidden">
        <div class="modal-card">
            <h2 id="modal-title"></h2>
            <div id="modal-body"></div>
            <div id="modal-buttons" class="modal-buttons"></div>
        </div>
    </div>

    <!-- Картка нерухомості -->
    <div id="property-modal" class="modal hidden">
        <div class="property-card" id="property-card-content"></div>
    </div>

    <!-- Модулі завантажуються в строгому порядку:
         board.js — дані та глобальний стан;
         ui.js    — рендеринг, модалки, звуки;
         engine.js — ігрова логіка;
         script.js — точка входу і валідація. -->
    <script src="games/monopoly/board.js"></script>
    <script src="games/monopoly/icons.js"></script>
    <script src="games/monopoly/ui.js"></script>
    <script src="games/monopoly/engine.js"></script>
    <script src="games/monopoly/script.js"></script>
</body>
</html>
