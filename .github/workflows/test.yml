name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start server
        run: node server.js &
        env:
          PORT: 3000
          JWT_SECRET: ci-test-secret

      - name: Wait for server
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000 && break
            sleep 1
          done

      - name: Run Durak bot test
        run: node tests/test-durak.js
        env:
          URL: http://localhost:3000
          N: 3
          TIMEOUT: 25000

      - name: Run Mafia bot test
        run: node tests/test-mafia.js
        env:
          URL: http://localhost:3000
          TIMEOUT: 25000
